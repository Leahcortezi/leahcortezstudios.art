<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="410" viewBox="0 0 3200 410">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#0D1B2A" />
      <stop offset="45%" stop-color="#0F3D57" />
      <stop offset="100%" stop-color="#6FC3B1" />
    </linearGradient>
    <filter id="grain" x="-50%" y="-50%" width="200%" height="200%">
      <feTurbulence baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="t" />
      <feColorMatrix type="saturate" values="0" />
      <feBlend in="SourceGraphic" mode="overlay" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#g)" />

  <!-- subtle diagonal band -->
  <g opacity="0.08" transform="translate(0,0)">
    <rect x="-200" y="-200" width="1600" height="800" fill="#FFF" transform="rotate(-18 600 200)" />
  </g>

  <!-- decorative circle motif on the right -->
  <g transform="translate(2600,180)" opacity="0.12">
    <circle r="180" fill="#fff" />
    <circle r="120" fill="#0D1B2A" opacity="0.08" />
  </g>

  <!-- Left text block -->
  <g transform="translate(120,80)">
    <!-- Name -->
    <text x="0" y="0" font-family="Helvetica, Arial, Inter, system-ui, -apple-system, sans-serif" font-weight="700" font-size="72" fill="#FFFFFF">Leah Cortez</text>

    <!-- Role & location -->
    <text x="0" y="72" font-family="Helvetica, Arial, Inter, system-ui, -apple-system, sans-serif" font-weight="600" font-size="28" fill="#D7F6EE">Graphic Designer & Independent Printmaker — Corpus Christi</text>

    <!-- Divider -->
    <rect x="0" y="94" width="840" height="2" fill="#FFFFFF" opacity="0.12" />

    <!-- About (wrapped manually across lines) -->
    <text x="0" y="128" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#E6FFF8" xml:space="preserve">
      <tspan x="0" dy="0">I am a graphic designer and independent printmaker based in Corpus Christi, currently studying</tspan>
      <tspan x="0" dy="28">design at TAMU-CC. My work explores the balance between structure and disruption, combining</tspan>
      <tspan x="0" dy="28">strong composition with expressive energy.</tspan>
    </text>

    <!-- Focus areas -->
    <text x="0" y="232" font-family="Helvetica, Arial, Inter, system-ui, -apple-system, sans-serif" font-weight="600" font-size="20" fill="#CFF8ED">Focus — Visual identity · Editorial design · Poster systems</text>

    <!-- Experience line -->
    <text x="0" y="260" font-family="Helvetica, Arial, Inter, system-ui, -apple-system, sans-serif" font-size="18" fill="#BFF1E3">Experience in freelance client work, marketing materials, and self-produced print distribution</text>

    <!-- Intent / seeking -->
    <text x="0" y="300" font-family="Helvetica, Arial, Inter, system-ui, -apple-system, sans-serif" font-weight="600" font-size="18" fill="#E6FFF8">Seeking internship opportunities and collaborative projects in branding, print, and visual communication — Spring 2027</text>

    <!-- Small CTA / contact hint -->
    <text x="0" y="336" font-family="Helvetica, Arial, Inter, system-ui, -apple-system, sans-serif" font-size="16" fill="#A8F0DD">Portfolio: your-portfolio-url.com  ·  Email: hello@yourdomain.com</text>
  </g>

  <!-- Right visual accent — stacked rectangles -->
  <g transform="translate(2180,40)">
    <rect x="0" y="0" width="760" height="360" rx="8" fill="#ffffff" opacity="0.03" />
    <rect x="20" y="20" width="720" height="320" rx="6" fill="#fff" opacity="0.02" stroke="#fff" stroke-width="1" opacity="0.02"/>

    <!-- placeholder for work thumbnails (3) -->
    <g transform="translate(30,30)" opacity="0.9">
      <rect x="0" y="0" width="220" height="260" rx="6" fill="#0D1B2A"/>
      <rect x="250" y="0" width="220" height="260" rx="6" fill="#123145"/>
      <rect x="500" y="0" width="120" height="260" rx="6" fill="#1B4D54"/>
    </g>
  </g>

  <!-- subtle grain overlay -->
  <rect width="100%" height="100%" fill="#000" filter="url(#grain)" opacity="0.02" />

  <!-- small credit shown in corner -->
  <text x="3200" y="405" font-family="Helvetica, Arial, Inter" font-size="12" fill="#FFFFFF" opacity="0.12" text-anchor="end">Behance header • 3200×410</text>
</svg>