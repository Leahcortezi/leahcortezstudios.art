<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Archive Slip | Leah Cortez Studios</title>
    <meta name="description" content="This page slipped out of the archive. Use quick links to return to Leah Cortez Studios.">

    <script>
        (function () {
            const currentUrl = new URL(window.location.href);
            let baseUrl;

            if (currentUrl.pathname.endsWith('/404.html')) {
                baseUrl = currentUrl.href;
            } else {
                baseUrl = `${currentUrl.origin}/`;
            }

            window.__archiveResolveUrl = function (relativePath) {
                return new URL(relativePath, baseUrl).href;
            };

            const faviconMain = document.createElement('link');
            faviconMain.id = 'favicon-main';
            faviconMain.rel = 'icon';
            faviconMain.type = 'image/x-icon';
            faviconMain.href = window.__archiveResolveUrl('icons/favicon.ico?v=2025');
            document.head.appendChild(faviconMain);

            const faviconShortcut = document.createElement('link');
            faviconShortcut.id = 'favicon-shortcut';
            faviconShortcut.rel = 'shortcut icon';
            faviconShortcut.type = 'image/x-icon';
            faviconShortcut.href = window.__archiveResolveUrl('icons/favicon.ico?v=2025');
            document.head.appendChild(faviconShortcut);

            const stylesMain = document.createElement('link');
            stylesMain.id = 'styles-main';
            stylesMain.rel = 'stylesheet';
            stylesMain.href = window.__archiveResolveUrl('css/styles.css');
            document.head.appendChild(stylesMain);

            const styles404 = document.createElement('link');
            styles404.id = 'styles-404';
            styles404.rel = 'stylesheet';
            styles404.href = window.__archiveResolveUrl('css/404.css');
            document.head.appendChild(styles404);
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600;700&family=IM+Fell+English&display=swap" rel="stylesheet">

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const resolveUrl = window.__archiveResolveUrl || function (path) { return path; };

            const homeLink = document.getElementById('home-link');
            const archiveLink = document.getElementById('archive-link');
            const contactLink = document.getElementById('contact-link');

            if (homeLink) homeLink.href = resolveUrl('index.html');
            if (archiveLink) archiveLink.href = resolveUrl('collections/index.html');
            if (contactLink) contactLink.href = resolveUrl('contact/index.html');
        });
    </script>
</head>
<body class="page-loaded">
    <main class="archive-404" aria-labelledby="not-found-title">
        <section class="archive-404-card">
            <p class="archive-404-code" aria-hidden="true">404</p>
            <h1 id="not-found-title">Page Not Found</h1>
            <p class="archive-404-message">
                This page wandered off. The link may be old, moved, or mistyped.
            </p>

            <nav class="archive-404-links" aria-label="Recovery links">
                <a id="home-link" href="index.html">Return Home</a>
                <a id="archive-link" href="collections/index.html">Browse Archive</a>
                <a id="contact-link" href="contact/index.html">Contact</a>
            </nav>

            <p class="archive-404-note">Leah Cortez Studios</p>
        </section>
    </main>

    <script>
        (function () {
            const resolveUrl = window.__archiveResolveUrl || function (path) { return path; };
            const sharedMainScript = document.createElement('script');
            sharedMainScript.src = resolveUrl('scripts/main.js');
            sharedMainScript.defer = true;
            document.body.appendChild(sharedMainScript);
        })();
    </script>
</body>
</html>
