<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leah Cortez Studios - Behance Banner</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            font-family: 'DM Sans', sans-serif;
        }

        .banner-container {
            width: 3200px;
            height: 410px;
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 50%, #0d0d0d 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 100px;
            position: relative;
            overflow: hidden;
        }

        /* Animated decorative background elements */
        .bg-decoration {
            position: absolute;
            opacity: 0.1;
            z-index: 0;
        }

        .bg-circle-1 {
            width: 400px;
            height: 400px;
            background: #f8c8d0;
            border-radius: 50%;
            top: -100px;
            right: -100px;
        }

        .bg-circle-2 {
            width: 300px;
            height: 300px;
            background: #e0b0b8;
            border-radius: 50%;
            bottom: -80px;
            left: -80px;
        }

        .content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 2;
            width: 100%;
        }

        .text-section {
            flex: 0 0 50%;
            display: flex;
            flex-direction: column;
        }

        .title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 160px;
            font-weight: 700;
            color: #f8c8d0;
            line-height: 0.9;
            margin-bottom: 20px;
            letter-spacing: -3px;
        }

        .tagline {
            font-family: 'DM Sans', sans-serif;
            font-size: 24px;
            font-weight: 500;
            color: #ffffff;
            line-height: 1.4;
            letter-spacing: 0.5px;
            max-width: 700px;
        }

        .accent-line {
            width: 120px;
            height: 3px;
            background: linear-gradient(90deg, #f8c8d0 0%, #e0b0b8 100%);
            margin-top: 30px;
        }

        .visual-section {
            flex: 0 0 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .editorial-block {
            position: relative;
            width: 420px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Logo styling */
        .logo-container {
            position: absolute;
            width: 220px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #f8c8d0;
            opacity: 0.8;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: brightness(1.1);
        }

        /* Editorial text accent */
        .editorial-text {
            position: absolute;
            font-family: 'Cormorant Garamond', serif;
            color: #f8c8d0;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .text-corner-1 {
            font-size: 28px;
            font-weight: 700;
            top: 0;
            right: 20px;
        }

        .text-corner-2 {
            font-size: 20px;
            font-weight: 400;
            bottom: 10px;
            left: 0;
            letter-spacing: 4px;
        }

        /* Geometric accent lines */
        .accent-bar-vertical {
            position: absolute;
            width: 3px;
            height: 180px;
            background: linear-gradient(180deg, #f8c8d0 0%, transparent 100%);
            left: -40px;
            top: 60px;
        }

        .accent-bar-horizontal {
            position: absolute;
            width: 180px;
            height: 2px;
            background: #f8c8d0;
            bottom: 30px;
            right: -60px;
            opacity: 0.5;
        }

        @media (max-width: 1600px) {
            .banner-container {
                padding: 0 80px;
            }

            .title {
                font-size: 130px;
            }

            .tagline {
                font-size: 20px;
            }

            .shape-grid {
                width: 300px;
                height: 220px;
            }

            .shape-1 {
                width: 110px;
                height: 110px;
            }

            .shape-2 {
                width: 100px;
                height: 100px;
            }

            .shape-4 {
                width: 65px;
                height: 65px;
            }
        }
    </style>
</head>
<body>
    <div class="banner-container">
        <div class="bg-decoration bg-circle-1"></div>
        <div class="bg-decoration bg-circle-2"></div>

        <div class="content">
            <div class="text-section">
                <h1 class="title">Leah<br>Cortez</h1>
                <p class="tagline">Graphic Design | Communication Design | Visual Narratives</p>
                <div class="accent-line"></div>
            </div>

            <div class="visual-section">
                <div class="editorial-block">
                    <div class="logo-container">
                        <img src="images/logo/logo2.svg" alt="Leah Cortez Logo">
                    </div>
                    <div class="editorial-text text-corner-1">DESIGN</div>
                    <div class="editorial-text text-corner-2">2026</div>
                    <div class="accent-bar-vertical"></div>
                    <div class="accent-bar-horizontal"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
